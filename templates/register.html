{% extends "base.html" %}
{% block title %}Register - Nishan{% endblock %}

{% block content %}
<section class="py-5" style="background-color: #f8f9fa; min-height: 80vh;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card rounded-0 shadow-sm border-0">
                    <div class="card-header bg-dark text-white rounded-0 py-3 text-center">
                        <h4 class="mb-0 text-uppercase fw-bold" style="letter-spacing: 1px;">Join the Network</h4>
                    </div>
                    <div class="card-body p-5">
                        <div class="mb-4 text-center">
                            <a href="/login/gauth" class="btn btn-outline-dark rounded-0 w-100 mb-2 py-2 fw-bold">
                                <i class="bi bi-google me-2"></i> Instant Login with Google
                            </a>
                            <a href="/login/github" class="btn btn-outline-dark rounded-0 w-100 py-2 fw-bold">
                                <i class="bi bi-github me-2"></i> Join via Github OAuth
                            </a>
                        </div>
                        <div class="hr-border d-flex align-items-center mb-4">
                            <hr class="flex-grow-1"> <span class="mx-3 text-muted small">OR REGISTER MANUALLY</span> <hr class="flex-grow-1">
                        </div>
                        
                        <form action="/register" method="POST">

                            <div class="mb-3">
                                <label for="name" class="form-label fw-bold text-uppercase small" style="letter-spacing: 1px;">Full Name</label>
                                <input type="text" id="name" name="name" class="form-control rounded-0" required placeholder="John Doe">

                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label fw-bold text-uppercase small" style="letter-spacing: 1px;">Email Address</label>
                                <input type="email" id="email" name="email" class="form-control rounded-0" required placeholder="john@example.com">

                            </div>

                            <div class="mb-3">
                                <label for="mobile" class="form-label fw-bold text-uppercase small" style="letter-spacing: 1px;">Mobile Number</label>
                                <input type="text" id="mobile" name="mobile" class="form-control rounded-0" required placeholder="+1234567890">

                            </div>

                            <div class="mb-4">
                                <label for="dob" class="form-label fw-bold text-uppercase small" style="letter-spacing: 1px;">Date of Birth</label>
                                <input type="date" id="dob" name="dob" class="form-control rounded-0" required>

                            </div>

                            <button type="submit" class="btn btn-dark w-100 rounded-0 py-2 text-uppercase fw-bold" style="letter-spacing: 1px;">Send Verification OTP</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
